name: Publish agent OCI artifact

# DEPLOY half of the split: the agent is BUILT in allot-rnd/beacon (the monorepo)
# and PUBLISHED here. Because GHCR records package ownership by the repo whose
# token runs `oras push`, publishing from THIS repo makes ghcr.io/allot-rnd/
# beacon-agent owned by allot-rnd/beacon-agent — so a read:packages PAT scoped to
# this repo pulls ONLY the agent (never the board image).
#
# Trigger: the monorepo's release.yml fires a repository_dispatch(publish-agent)
# after it builds + uploads the binaries to its Release. workflow_dispatch is the
# manual path (first re-home + re-runs).

on:
  repository_dispatch:
    types: [publish-agent]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag in allot-rnd/beacon to publish (e.g. v0.8.4)"
        required: true

permissions:
  contents: read
  packages: write   # own + push ghcr.io/<owner>/beacon-agent from THIS repo

jobs:
  publish:
    name: Publish agent artifact
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: t
        run: echo "tag=${{ github.event.client_payload.tag || inputs.tag }}" >> "$GITHUB_OUTPUT"

      # Pull the already-built agent binaries + installers from the monorepo's
      # Release. MONOREPO_READ_TOKEN is a token with Contents:read on allot-rnd/beacon.
      - name: Download agent artifacts from the beacon release
        env:
          GH_TOKEN: ${{ secrets.MONOREPO_READ_TOKEN }}
        run: |
          set -euo pipefail
          tag='${{ steps.t.outputs.tag }}'
          [ -n "$tag" ] || { echo "no tag provided"; exit 1; }
          mkdir -p dist && cd dist
          gh release download "$tag" --repo ${{ github.repository_owner }}/beacon \
            --pattern 'beacon-agent-*' --pattern 'install.sh' --pattern 'install.ps1' --pattern 'checksums.txt'
          echo "downloaded:"; ls -la

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: oras-project/setup-oras@v1

      - name: Publish agent artifact to GHCR
        working-directory: dist
        run: |
          set -euo pipefail
          pkg="ghcr.io/${{ github.repository_owner }}/beacon-agent"
          tag='${{ steps.t.outputs.tag }}'
          oras push "${pkg}:${tag}" \
            --artifact-type application/vnd.allot.beacon-agent \
            --annotation "org.opencontainers.image.source=https://github.com/${{ github.repository_owner }}/beacon-agent" \
            beacon-agent-darwin-amd64:application/octet-stream \
            beacon-agent-darwin-arm64:application/octet-stream \
            beacon-agent-linux-amd64:application/octet-stream \
            beacon-agent-linux-arm64:application/octet-stream \
            beacon-agent-windows-amd64.exe:application/octet-stream \
            checksums.txt:text/plain \
            install.sh:text/x-shellscript \
            install.ps1:text/plain
          # Move :latest on stable releases only (skip pre-releases like v1.2.3-rc1).
          case "$tag" in
            *-*) echo "pre-release $tag: not moving :latest" ;;
            *)   oras tag "${pkg}:${tag}" latest ;;
          esac
          echo "published ${pkg}:${tag}"
